<!DOCTYPE html>
<html>
<head>
    <title>📸 Booking Admin - MongoDB</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a1a;
            color: #e5e5e5;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #10b981;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #10b981;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #10b981;
        }
        
        .stat-label {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .table-container {
            background: #2d2d2d;
            border-radius: 10px;
            overflow-x: auto;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }
        
        th {
            text-align: left;
            padding: 12px;
            background: #10b981;
            color: white;
            font-weight: 600;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #404040;
        }
        
        tr:hover {
            background: #333333;
        }
        
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-PENDING { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
        .status-CONFIRMED { background: #10b98120; color: #10b981; border: 1px solid #10b981; }
        .status-CANCELLED { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
        .status-COMPLETED { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f6; }
        
        .refresh-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: #059669;
        }
        
        .booking-ref {
            font-family: monospace;
            font-weight: bold;
            color: #10b981;
        }
        
        .client-info {
            display: flex;
            flex-direction: column;
        }
        
        .client-email {
            font-size: 12px;
            color: #9ca3af;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        .error {
            background: #ef444420;
            color: #ef4444;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📸</span>
            Photography Booking Admin
        </h1>
        
        <button class="refresh-btn" onclick="loadAllData()">
            <span>🔄</span>
            Refresh Data
        </button>
        
        <!-- Stats -->
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalBookings">-</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingBookings">-</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="confirmedBookings">-</div>
                <div class="stat-label">Confirmed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="revenue">-</div>
                <div class="stat-label">Revenue</div>
            </div>
        </div>
        
        <!-- Bookings Table -->
        <div class="table-container">
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>Reference</th>
                        <th>Client</th>
                        <th>Package</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody id="bookingsBody">
                    <tr>
                        <td colspan="8" class="loading">Loading bookings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadAllData() {
            await Promise.all([
                loadBookings(),
                loadStats()
            ]);
        }
        
        async function loadBookings() {
            try {
                const response = await fetch('/api/bookings');
                if (!response.ok) throw new Error('Failed to fetch');
                
                const bookings = await response.json();
                
                if (bookings.length === 0) {
                    document.getElementById('bookingsBody').innerHTML = `
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 40px; color: #9ca3af;">
                                No bookings yet
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                const html = bookings.map(booking => {
                    const date = new Date(booking.sessionDate);
                    const created = new Date(booking.createdAt);
                    
                    return `
                        <tr>
                            <td>
                                <span class="booking-ref">${booking.bookingReference}</span>
                            </td>
                            <td>
                                <div class="client-info">
                                    <span>${booking.clientName}</span>
                                    <span class="client-email">${booking.clientEmail}</span>
                                </div>
                            </td>
                            <td>${booking.package.name}</td>
                            <td>${date.toLocaleDateString('en-US', { 
                                weekday: 'short', 
                                month: 'short', 
                                day: 'numeric', 
                                year: 'numeric' 
                            })}</td>
                            <td>${booking.sessionTime}</td>
                            <td>$${booking.price}</td>
                            <td>
                                <span class="status status-${booking.status}">${booking.status}</span>
                            </td>
                            <td>${created.toLocaleDateString()}</td>
                        </tr>
                    `;
                }).join('');
                
                document.getElementById('bookingsBody').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading bookings:', error);
                document.getElementById('bookingsBody').innerHTML = `
                    <tr>
                        <td colspan="8" class="error">
                            Error loading bookings: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) throw new Error('Failed to fetch stats');
                
                const stats = await response.json();
                
                document.getElementById('totalBookings').textContent = stats.totalBookings;
                document.getElementById('pendingBookings').textContent = stats.pendingBookings;
                document.getElementById('confirmedBookings').textContent = stats.confirmedBookings;
                document.getElementById('revenue').textContent = `$${stats.revenue}`;
                
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Auto refresh every 30 seconds
        setInterval(loadAllData, 30000);
        
        // Initial load
        loadAllData();
    </script>
</body>
</html>
